<!DOCTYPE html>
<html>
<head><title>Icon Preview</title></head>
<body style="background:#f5f6fa;display:flex;gap:20px;padding:40px;align-items:center;flex-wrap:wrap">
  <div style="text-align:center">
    <img src="icon-192.png" width="192" height="192" style="border-radius:40px;box-shadow:0 8px 32px rgba(0,0,0,0.15)"/>
    <p style="font-family:sans-serif;margin-top:10px;color:#666">192x192</p>
  </div>
  <div style="text-align:center">
    <img src="icon-192.png" width="96" height="96" style="border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,0.15)"/>
    <p style="font-family:sans-serif;margin-top:10px;color:#666">96x96</p>
  </div>
  <div style="text-align:center">
    <img src="icon-192.png" width="48" height="48" style="border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.15)"/>
    <p style="font-family:sans-serif;margin-top:10px;color:#666">48x48</p>
  </div>
  <div style="text-align:center;background:#333;padding:20px;border-radius:16px">
    <img src="icon-192.png" width="96" height="96" style="border-radius:20px"/>
    <p style="font-family:sans-serif;margin-top:10px;color:#aaa">Dark bg</p>
  </div>
</body>
</html>
